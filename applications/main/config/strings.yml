    missing_data: 'Use to evaluate for systematic missingness. Defined as patients who meet the criteria to be included in specified health outcome, but who were not assessed, so are not included in the denominator.'
    fishers_exact_test: "Fisher's exact test is a statistical test used to determine if there is a nonrandom association between two categorical variables. Here, results are adjusted for multiple testing, and -log10 transformed to increase interpretability and stabilize the distribution of the p-values."
    vif_plot: 'Measure of multicollinearity in the model. VIF is calculated for each independent variable in the model. VIF of 1 indicates no multicollinearity; VIF > 1 indicates increasing levels of multicollinearity. A high VIF value indicates that the variance for the coefficient of that variable is inflated due to correlation with other variables in the model - the coefficient is less reliable and its significance may be overstated.'
